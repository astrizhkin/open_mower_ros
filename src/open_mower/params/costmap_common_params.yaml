uss_2_sensor_data: {sensor_frame: uss_2, data_type: Range, topic: /mower/uss, marking: true, clearing: true}
uss_3_sensor_data: {sensor_frame: uss_3, data_type: Range, topic: /mower/uss, marking: true, clearing: true}
uss_4_sensor_data: {sensor_frame: uss_4, data_type: Range, topic: /mower/uss, marking: true, clearing: true}

