rear:
  joint_publisher:
    type: "joint_state_controller/JointStateController"
    publish_rate: 10
    left_wheel: 'rear_left_wheel'
    right_wheel: 'rear_right_wheel'

  velocity_controller:
    type        : "diff_drive_controller/DiffDriveController"
    left_wheel: 'rear_left_wheel'
    right_wheel: 'rear_right_wheel'
    open_loop: false
    publish_rate: 10.0               # default: 50
    pose_covariance_diagonal : [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 1000.0]
    twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 1000.0]

    # Wheel separation and diameter. These are both optional.
    # diff_drive_controller will attempt to read either one or both from the
    # URDF if not specified as a parameter
    #wheel_separation : 0.5
    #wheel_radius : 0.0825
    wheel_separation : $(env OM_WHEEL_SEPARATION_M)
    wheel_radius : $(env OM_WHEEL_RADIUS_M)

    # Wheel separation and radius multipliers
    wheel_separation_multiplier: 1.0

    # Velocity commands timeout [s], default 0.5
    cmd_vel_timeout: 0.5

    # Base frame_id
    base_frame_id: base_link
    allow_multiple_cmd_vel_publishers: false
    odom_frame_id: '/rear_raw_odom'
    enable_odom_tf: false
    publish_cmd: false
    publish_wheel_joint_controller_state: false

    # Velocity and acceleration limits
    # Whenever a min_* is unspecified, default to -max_*
    linear:
      x:
        has_velocity_limits    : true
        max_velocity           : 1.0  # m/s
        has_acceleration_limits: true
        max_acceleration       : 2.0  # m/s^2
        #max_jerk doesn't work together with max_acceleration
        has_jerk_limits        : false
        max_jerk               : 0.0  # m/s^3
    angular:
      z:
        has_velocity_limits    : true # was true
        max_velocity           : 6.28  # rad/s
        has_acceleration_limits: true # was true
        max_acceleration       : 6.28  # rad/s^2
        #max_jerk doesn't work together with max_acceleration
        has_jerk_limits        : false
        max_jerk               : 0.0  # rad/s^3

