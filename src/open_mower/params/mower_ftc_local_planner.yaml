FTCPlanner:
  acceleration: 0.2
  check_obstacles: false
  debug_pid: true
  forward_only: true
  restore_defaults: false
  goal_timeout: 20.0

#PID
#longitudinal control
  kp_lon: 1.0
  kd_lon: 0.0
  ki_lon: 0.0
  ki_lon_max: 1.0
#lateral control
  kp_lat: 4.0
  kd_lat: 0.0
  ki_lat: 0.0
  ki_lat_max: 2.0
#angular control
  kp_ang: 1.0
  kd_ang: 0.0
  ki_ang: 0.0
  ki_ang_max: 1.0

#Claude
#kp_lon: 0.8      // Proportional gain for longitudinal control
#ki_lon: 0.05     // Integral gain for longitudinal control
#kd_lon: 0.1      // Derivative gain for longitudinal control
#ki_lon_max: 0.5  // Maximum integral term to prevent wind-up
#kp_lat: 1.0      // Proportional gain for lateral control
#ki_lat: 0.02     // Integral gain for lateral control
#kd_lat: 0.2      // Derivative gain for lateral control
#ki_lat_max: 0.3  // Maximum integral term to prevent wind-up
#kp_ang: 1.5      // Proportional gain for angular control
#ki_ang: 0.01     // Integral gain for angular control
#kd_ang: 0.3      // Derivative gain for angular control
#ki_ang_max: 0.2  // Maximum integral term to prevent wind-up

#ROBOT
  max_cmd_vel_ang: 3.14
  max_cmd_vel_speed: 1.0
  max_follow_distance: 1.0
  max_goal_angle_error: 20.0
  max_goal_distance_error: 0.2

#CARROT
  speed_angular: 40.0
  speed_fast: 0.6
  speed_fast_threshold: 1.5
  speed_fast_threshold_angle: 20.0
  speed_slow: 0.4